---
- name: Verify
  hosts: all
  gather_facts: true
  tasks:
    - name: Check zsh binary
      ansible.builtin.stat:
        path: /usr/bin/zsh
      register: zsh_bin

    - name: Assert zsh is installed
      ansible.builtin.assert:
        that: zsh_bin.stat.exists
        fail_msg: "zsh binary not found at /usr/bin/zsh"

    - name: Run zsh --version
      ansible.builtin.command: zsh --version
      register: zsh_version
      changed_when: false

    - name: Assert zsh version output
      ansible.builtin.assert:
        that: "'zsh' in zsh_version.stdout"
        fail_msg: "zsh --version did not produce expected output"

    - name: Verify zsh runs a basic command
      ansible.builtin.command: zsh -c 'echo ok'
      register: zsh_run
      changed_when: false

    - name: Assert zsh executed successfully
      ansible.builtin.assert:
        that: zsh_run.stdout == 'ok'
        fail_msg: "zsh -c 'echo ok' did not return 'ok'"

    - name: Check ~/.config/zsh directory
      ansible.builtin.stat:
        path: "{{ ansible_facts['env']['HOME'] }}/.config/zsh"
      register: zsh_dir

    - name: Assert ~/.config/zsh directory exists
      ansible.builtin.assert:
        that: zsh_dir.stat.exists and zsh_dir.stat.isdir
        fail_msg: "~/.config/zsh directory not found"

    - name: Check ~/.config/zsh/.zshrc
      ansible.builtin.stat:
        path: "{{ ansible_facts['env']['HOME'] }}/.config/zsh/.zshrc"
      register: zshrc_source

    - name: Assert ~/.config/zsh/.zshrc exists
      ansible.builtin.assert:
        that: zshrc_source.stat.exists
        fail_msg: "~/.config/zsh/.zshrc not found"

    - name: Check ~/.zshrc symlink
      ansible.builtin.stat:
        path: "{{ ansible_facts['env']['HOME'] }}/.zshrc"
      register: zshrc

    - name: Assert ~/.zshrc exists
      ansible.builtin.assert:
        that: zshrc.stat.exists
        fail_msg: "~/.zshrc not found"

    - name: Check Powerlevel10k theme directory
      ansible.builtin.stat:
        path: "{{ ansible_facts['env']['HOME'] }}/.local/share/zsh/powerlevel10k"
      register: p10k_dir

    - name: Assert Powerlevel10k is installed
      ansible.builtin.assert:
        that: p10k_dir.stat.exists and p10k_dir.stat.isdir
        fail_msg: "~/.local/share/zsh/powerlevel10k not found"

    - name: Check Nerd Font installed
      ansible.builtin.stat:
        path: "{{ ansible_facts['env']['HOME'] }}/.local/share/fonts/DejaVuSansMNerdFontMono-Regular.ttf"
      register: nerd_font

    - name: Assert Nerd Font is installed
      ansible.builtin.assert:
        that: nerd_font.stat.exists
        fail_msg: "Nerd Font not found at ~/.local/share/fonts"
