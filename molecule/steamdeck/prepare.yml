---
- name: Prepare
  hosts: all
  gather_facts: false
  tasks:
    - name: Simulate SteamOS /etc/os-release
      become: true
      ansible.builtin.copy:
        content: |
          ID=steamos
          ID_LIKE=arch
          NAME="SteamOS"
          PRETTY_NAME="SteamOS"
          VERSION_ID="3.6"
        dest: /etc/os-release
        mode: "0644"

    - name: Install curl and unzip (simulate SteamOS)
      become: true
      community.general.pacman:
        name:
          - curl
          - unzip
        state: present
        update_cache: true
