---
- name: Update cache when Ubuntu
  become: true
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  when: ansible_facts['os_family'] == 'Debian'

- name: Update cache when Arch Linux
  become: true
  community.general.pacman:
    update_cache: true
  when: ansible_facts['os_family'] == 'Archlinux'

- name: Ensure git is installed
  become: true
  ansible.builtin.package:
    name: git
    state: present
  tags: ["git"]

- name: Ensure zsh is installed
  become: true
  ansible.builtin.package:
    name: zsh
    state: present
  tags: ["zsh"]

- name: Create ~/.config/zsh directory
  become: false
  ansible.builtin.file:
    path: "~/.config/zsh"
    state: directory
    mode: '0755'
  tags: ["zsh"]

- name: Ensure fontconfig and unzip are installed
  become: true
  ansible.builtin.package:
    name:
      - fontconfig
      - unzip
    state: present
  tags: ["fonts"]

- name: Create ~/.local/share/fonts directory
  become: false
  ansible.builtin.file:
    path: ~/.local/share/fonts
    state: directory
    recurse: true
  tags: ["fonts"]

- name: Download Nerd Fonts (dejavu-sans-mono-nerdfonts)
  become: false
  ansible.builtin.unarchive:
    src: https://github.com/ryanoasis/nerd-fonts/releases/download/v3.3.0/DejaVuSansMono.zip
    dest: ~/.local/share/fonts
    remote_src: true
    creates: '~/.local/share/fonts/DejaVuSansMNerdFontMono-Regular.ttf'
  notify: Fc-cache
  tags: ["fonts"]

- name: Generate ~/.config/zsh/ files
  become: false
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "~/.config/zsh/{{ item }}"
    mode: '0644'
  loop:
    - zshrc
    - zshenv
    - alias.zsh
    - export.zsh
    - functions.zsh
    - keybindings.zsh
    - prompt.zsh
    - python.zsh
    - ansible.zsh
  tags: ["zsh"]

- name: Link zshrc and zshenv
  become: false
  ansible.builtin.file:
    src: "~/.config/zsh/{{ item }}"
    dest: "~/.{{ item }}"
    state: link
    force: true
  loop:
    - zshrc
    - zshenv
  tags: ["zsh"]

- name: Set user shell to zsh
  become: true
  ansible.builtin.user:
    name: "{{ user }}"
    shell: /bin/zsh
  tags: ["zsh"]
