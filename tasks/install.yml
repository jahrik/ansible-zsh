---
- name: Detect SteamOS
  ansible.builtin.stat:
    path: /etc/steamos-release
  register: steamos_release

- name: Install (SteamOS)
  ansible.builtin.include_tasks: steamdeck.yml
  when: steamos_release.stat.exists

- name: Install (Arch Linux)
  ansible.builtin.include_tasks: archlinux.yml
  when:
    - ansible_facts['os_family'] == 'Archlinux'
    - not steamos_release.stat.exists

- name: Install (Debian/Ubuntu)
  ansible.builtin.include_tasks: debian.yml
  when: ansible_facts['os_family'] == 'Debian'

- name: Install (macOS)
  ansible.builtin.include_tasks: darwin.yml
  when: ansible_facts['os_family'] == 'Darwin'

- name: Create ~/.config/zsh directory
  become: false
  ansible.builtin.file:
    path: "~/.config/zsh"
    state: directory
    mode: '0755'
  tags: ["zsh"]

- name: Create ~/.local/share/fonts directory
  become: false
  ansible.builtin.file:
    path: ~/.local/share/fonts
    state: directory
    recurse: true
  tags: ["fonts"]

- name: Download Nerd Fonts (DejaVuSansMono)
  become: false
  ansible.builtin.unarchive:
    src: https://github.com/ryanoasis/nerd-fonts/releases/download/v3.3.0/DejaVuSansMono.zip
    dest: ~/.local/share/fonts
    remote_src: true
    creates: '~/.local/share/fonts/DejaVuSansMNerdFontMono-Regular.ttf'
  notify: Fc-cache
  tags: ["fonts"]

- name: Clone Powerlevel10k
  become: false
  ansible.builtin.git:
    repo: https://github.com/romkatv/powerlevel10k.git
    dest: "~/.local/share/zsh/powerlevel10k"
    depth: 1
  tags: ["zsh", "theme"]

- name: Generate ~/.config/zsh/ files
  become: false
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "~/.config/zsh/{{ '.' if item in ['zshrc', 'zshenv', 'p10k.zsh'] else '' }}{{ item }}"
    mode: '0644'
  loop:
    - zshrc
    - zshenv
    - p10k.zsh
    - export.zsh
    - functions.zsh
  tags: ["zsh"]

- name: Link zshrc and zshenv
  become: false
  ansible.builtin.file:
    src: "~/.config/zsh/.{{ item }}"
    dest: "~/.{{ item }}"
    state: link
    force: true
  loop:
    - zshrc
    - zshenv
  tags: ["zsh"]
